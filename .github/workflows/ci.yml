name: CI

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    # 擁有者 Mac 是 3.9 floor、本機是唯一產線（D16 後 brief 走對話、flash 手動 dispatch）。
    # CI 必須在 3.9 也跑，否則 3.10+ 語法/stdlib 會 CI 綠卻在擁有者本機才炸（守錯門）。
    strategy:
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile Python scripts
        run: python -m py_compile scripts/*.py

      # CI-only lint：不進 requirements.txt、不上產線（擁有者 2026-06-16 放行）。
      # 抓 AI 改碼最常見、與測試正交的回歸：未定義名稱 / 未用 import / 壞 f-string。
      # --target-version py39 同時幫驗 3.9 相容語法。
      - name: Lint (ruff, CI-only)
        run: |
          python -m pip install ruff
          python -m ruff check --target-version py39 scripts tests

      # 單一驗收入口：validate_repo / repo_health / track_rankings /
      # generate_* 全部由 test_smoke 內部執行——不在這裡重複跑（同樣的事兩遍 = 浪費 + 雙處維護）。
      - name: Acceptance smoke tests
        env:
          PYTHONIOENCODING: utf-8
        run: python tests/test_smoke.py
