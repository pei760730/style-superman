name: CI

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile Python scripts
        run: python -m py_compile scripts/*.py

      # 單一驗收入口：validate_repo / repo_health / score_trends / track_rankings /
      # generate_* 全部由 test_smoke 內部執行——不在這裡重複跑（同樣的事兩遍 = 浪費 + 雙處維護）。
      - name: Acceptance smoke tests
        env:
          PYTHONIOENCODING: utf-8
        run: python tests/test_smoke.py
