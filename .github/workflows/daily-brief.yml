name: Daily Brief

# 每日自動產出 Daily Brief 骨架。
#
# 現階段只跑 generate_daily_brief.py（填模板 + 來源摘要），
# 把骨架 commit 回 repo。趨勢內容由對話中的 agent / 排程雲端 agent 補上
# ——不在 workflow 內呼叫 LLM API（決策 D5，見 docs/decisions.md）。
#
# 觸發方式：
#   - workflow_dispatch：手動觸發
#   - schedule：每日 UTC 23:00（台灣時間隔日 07:00）自動產骨架（2026-06-10 由 Kai 拍板開啟）
#
# ⚠ 2026-06-10：本檔曾在 GitHub 端「註冊消失」（帳號風控後遺症，連 dispatch 都不可用）。
#   檔案內容變更並 push 即可重新註冊；「檔案在 ≠ 在跑」，要看 Actions run 紀錄（docs/lessons.md）。

on:
  workflow_dispatch:
  schedule:
    # 每天 UTC 23:00（台灣時間隔日 07:00）跑。
    # ⚠ runner 的「今天」是 UTC：23:00Z 時 UTC 日期仍是台灣的昨天，
    #   故日期必須以 Asia/Taipei 計算（見 Compute brief date step），不能讓腳本吃預設值。
    - cron: "0 23 * * *"
    # ⏳ TEMP（2026-06-11 schedule 觸發驗證用，驗證到一次實際觸發後即移除）：
    - cron: "25 17 * * *"
    - cron: "55 17 * * *"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Compute brief date (Asia/Taipei)
        id: briefdate
        run: |
          d="$(TZ=Asia/Taipei date +%F)"
          echo "date=$d" >> "$GITHUB_OUTPUT"
          echo "Brief date (Taipei): $d / runner UTC: $(date -u +%FT%TZ)"

      - name: Generate daily brief skeleton
        env:
          PYTHONIOENCODING: utf-8
        run: python scripts/generate_daily_brief.py --date "${{ steps.briefdate.outputs.date }}"

      - name: Commit brief if changed
        run: |
          git config user.name "style-superman-bot"
          git config user.email "actions@github.com"
          if [ -n "$(git status --porcelain reports/daily)" ]; then
            git add reports/daily
            git commit -m "brief: auto skeleton ${{ steps.briefdate.outputs.date }}"
            git push
          else
            echo "No new brief to commit."
          fi
