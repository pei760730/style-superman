name: Daily Brief

# 每日自動產出 Daily Brief 骨架 + 當日 RSS 訊號包。
#
# 跑 generate_daily_brief.py --with-rss：填模板骨架 + 在 egress 正常的 Actions
# 環境收集當日 RSS 訊號，寫成 reports/daily/<date>.signals.yml 一併 commit。
# 趨勢內容由對話中的 agent / 排程雲端 agent 補上——不在 workflow 內呼叫 LLM API（D5）。
#
# 為什麼在這裡收 RSS（2026-06-13）：雲端填寫 routine 的 sandbox 連不到 feed
# （PR #78 自述「RSS 28 源全降級」、退回 WebSearch 只湊 17 條），但 GitHub Actions
# 的 ubuntu runner egress 正常（本機同腳本可收 200+ 則）。把收集搬到這層、訊號落檔交棒，
# 寫手只負責「讀 signals + WebFetch 補內文 + 寫」，不再自己抓 RSS。
# signals 檔是中間產物：寫手填完 brief 後在同 PR 刪掉它（見 prompts/daily_trend_brief.md）。
#
# 觸發方式：
#   - workflow_dispatch：手動觸發
#   - schedule：每日 UTC 21:00（台灣時間隔日 05:00）自動產骨架（2026-06-10 由 Kai 拍板開啟；
#     2026-06-14 由 07:00 提早至 05:00——GitHub 排程慢性延遲 60–78 分,原與 07:30 填寫 routine 只差
#     30 分,Actions 一延遲就跑在 routine 後面、signals 來不及交棒。提早拉開間距至 ~150 分修競態。）
#
# ⚠ 2026-06-10：本檔曾在 GitHub 端「註冊消失」（帳號風控後遺症，連 dispatch 都不可用）。
#   檔案內容變更並 push 即可重新註冊；「檔案在 ≠ 在跑」，要看 Actions run 紀錄（docs/lessons.md）。

on:
  workflow_dispatch:
  schedule:
    # 每天 UTC 21:00（台灣時間隔日 05:00）跑。提早至 05:00 是為了和 07:30 填寫 routine 拉開
    # 間距（GitHub 排程慢性延遲 60–78 分；30 分間距會讓 signals 交棒落在 routine 之後）。
    # ⚠ runner 的「今天」是 UTC：21:00Z 時 UTC 日期仍是台灣的昨天（21:00Z = 台北隔日 05:00），
    #   故日期必須以 Asia/Taipei 計算（見 Compute brief date step），不能讓腳本吃預設值。
    - cron: "0 21 * * *"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Compute brief date (Asia/Taipei)
        id: briefdate
        run: |
          d="$(TZ=Asia/Taipei date +%F)"
          echo "date=$d" >> "$GITHUB_OUTPUT"
          echo "Brief date (Taipei): $d / runner UTC: $(date -u +%FT%TZ)"

      - name: Generate daily brief skeleton + collect RSS signals
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python scripts/generate_daily_brief.py \
            --date "${{ steps.briefdate.outputs.date }}" \
            --with-rss \
            --raw-signals-out "reports/daily/${{ steps.briefdate.outputs.date }}.signals.yml"

      - name: Commit brief + signals if changed
        run: |
          git config user.name "style-superman-bot"
          git config user.email "actions@github.com"
          if [ -n "$(git status --porcelain reports/daily)" ]; then
            git add reports/daily
            git commit -m "brief: auto skeleton + RSS signals ${{ steps.briefdate.outputs.date }}"
            # push race 防護:checkout→push 間隔內若 master 有他人 commit,原 git push 會
            # non-fast-forward 失敗。先試 push,被拒就 rebase 到最新 master 再試,最多 3 次。
            n=0
            until git push; do
              n=$((n+1))
              if [ "$n" -ge 3 ]; then echo "push failed after ${n} attempts"; exit 1; fi
              echo "push rejected (concurrent update?); rebasing onto origin/master (attempt ${n})…"
              git pull --rebase origin master
            done
          else
            echo "No new brief to commit."
          fi
