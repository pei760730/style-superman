name: Daily Brief

# 每日自動產出 Daily Brief 骨架。
#
# 現階段只跑 generate_daily_brief.py（填模板 + 來源摘要），
# 把骨架 commit 回 repo。趨勢內容由對話中的 agent / 排程雲端 agent 補上
# ——不在 workflow 內呼叫 LLM API（決策 D5，見 docs/decisions.md）。
#
# 觸發方式：
#   - workflow_dispatch：手動觸發（預設先用這個）
#   - schedule：每日定時（預設註解掉，要全自動時再打開）
#
# ⚠ 2026-06-10：本檔曾在 GitHub 端「註冊消失」（帳號風控後遺症，連 dispatch 都不可用）。
#   檔案內容變更並 push 即可重新註冊；「檔案在 ≠ 在跑」，要看 Actions run 紀錄（docs/lessons.md）。

on:
  workflow_dispatch:
  # schedule:
  #   # 每天 UTC 23:00（台灣時間隔日 07:00）跑
  #   - cron: "0 23 * * *"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Generate daily brief skeleton
        env:
          PYTHONIOENCODING: utf-8
        run: python scripts/generate_daily_brief.py

      - name: Commit brief if changed
        run: |
          git config user.name "style-superman-bot"
          git config user.email "actions@github.com"
          if [ -n "$(git status --porcelain reports/daily)" ]; then
            git add reports/daily
            git commit -m "brief: auto skeleton $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No new brief to commit."
          fi
