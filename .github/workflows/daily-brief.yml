name: Daily Brief

# ⚠⚠ 現況警告（2026-06-27 sleep-mode 巡檢標記）：本 workflow 與 D16 freeze gate 互斥，**目前 dispatch 會壞 master**。
#   1. generate_daily_brief.py（未帶 --draft）寫 `reports/daily/<date>.md` 骨架 → 下方 commit step `git add reports/daily`
#      會把它推上 master。但 06-26 的 D16 gate（validate_repo.py `DAILY_FREEZE_CUTOFF=2026-06-16`）會擋下
#      凍結線之後的 daily .md → push 後 master CI 立刻紅 + 留 stray 檔要人工刪（正是 D16 gate 要終結的「連四犯」痛點）。
#   2. 本檔註解說「收 signals 一併 commit 交棒」，但 `.gitignore` 已把 `reports/daily/*.signals.yml` 忽略
#      → `git add reports/daily` 根本 stage 不到 signals → 交棒路徑也已失效。
#   結論：在 D16（daily 對話即焚、不入庫）+ signals gitignored + freeze gate 三重夾擊下，本「手動備援」已無可行任務。
#   **修復需擁有者拍板方向**（屬決策層，巡檢不自行改 workflow 行為）：擇一——
#     (a) 退役本 workflow；(b) 改成只收 signals 寫進已 gitignore 的 scratch/、產 --draft 骨架、commit step 拿掉；
#     (c) 若真要保留 Actions egress 收訊號的能力，把 daily 從 freeze gate 豁免並重設計交棒。
#   在拍板前**請勿 dispatch**（會弄紅 master）。詳見 AI_SYSTEM_UPGRADE_REPORT.md 的 Run 2026-06-27。
#
# 每日自動產出 Daily Brief 骨架 + 當日 RSS 訊號包。
#
# 跑 generate_daily_brief.py --with-rss：填模板骨架 + 在 egress 正常的 Actions
# 環境收集當日 RSS 訊號，寫成 reports/daily/<date>.signals.yml 一併 commit。
# 趨勢內容由對話中的 agent / 排程雲端 agent 補上——不在 workflow 內呼叫 LLM API（D5）。
#
# 為什麼在這裡收 RSS（2026-06-13）：雲端填寫 routine 的 sandbox 連不到 feed
# （PR #78 自述「RSS 28 源全降級」、退回 WebSearch 只湊 17 條），但 GitHub Actions
# 的 ubuntu runner egress 正常（本機同腳本可收 200+ 則）。把收集搬到這層、訊號落檔交棒，
# 寫手只負責「讀 signals + WebFetch 補內文 + 寫」，不再自己抓 RSS。
# signals 檔是中間產物：寫手填完 brief 後在同 PR 刪掉它（見 prompts/daily_trend_brief.md）。
#
# 觸發方式（2026-06-14 起）：
#   - workflow_dispatch：手動備援，唯一入口。
#   - ~~schedule~~：已移除。每日 brief 改全對話觸發（D16）——雲端填寫 routine 在無人盯時會
#     退化成「只有標題的空殼 roundup」，對話裡 agent 認真跑（本機真收 400+ 訊號 + 逐條 WebFetch
#     挖 picks）品質更高、又省 routine 額度。schedule 留著只會每天 commit 沒人填的空骨架。
#
# ⚠ 2026-06-10：本檔曾在 GitHub 端「註冊消失」（帳號風控後遺症，連 dispatch 都不可用）。
#   檔案內容變更並 push 即可重新註冊；「檔案在 ≠ 在跑」，要看 Actions run 紀錄（docs/lessons.md）。

on:
  # 2026-06-14：移除 schedule。每日 brief 改全對話觸發（D16），雲端填寫 routine 已停用，
  # 此 workflow 不再需要每天自動收訊號 / 產骨架（否則會每天 commit 沒人填的空骨架 = 垃圾）。
  # 保留 workflow_dispatch 當手動備援：本機 collect_raw_signals.py 萬一失靈時，可手動在 egress
  # 正常的 runner 收一次訊號 / 產骨架。平時對話流程由 agent 在本機收訊號，不需要這層。
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Compute brief date (Asia/Taipei)
        id: briefdate
        run: |
          d="$(TZ=Asia/Taipei date +%F)"
          echo "date=$d" >> "$GITHUB_OUTPUT"
          echo "Brief date (Taipei): $d / runner UTC: $(date -u +%FT%TZ)"

      - name: Generate daily brief skeleton + collect RSS signals
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python scripts/generate_daily_brief.py \
            --date "${{ steps.briefdate.outputs.date }}" \
            --with-rss \
            --raw-signals-out "reports/daily/${{ steps.briefdate.outputs.date }}.signals.yml"

      - name: Commit brief + signals if changed
        run: |
          git config user.name "style-superman-bot"
          git config user.email "actions@github.com"
          if [ -n "$(git status --porcelain reports/daily)" ]; then
            git add reports/daily
            git commit -m "brief: auto skeleton + RSS signals ${{ steps.briefdate.outputs.date }}"
            # push race 防護:checkout→push 間隔內若 master 有他人 commit,原 git push 會
            # non-fast-forward 失敗。先試 push,被拒就 rebase 到最新 master 再試,最多 3 次。
            n=0
            until git push; do
              n=$((n+1))
              if [ "$n" -ge 3 ]; then echo "push failed after ${n} attempts"; exit 1; fi
              echo "push rejected (concurrent update?); rebasing onto origin/master (attempt ${n})…"
              git pull --rebase origin master
            done
          else
            echo "No new brief to commit."
          fi
