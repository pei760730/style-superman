name: Flash Brief

# ⚡ 手機可獨立觸發的「速報層」（D19，2026-06-16）。
#
# 跑 generate_flash.py：收當日 RSS → 對白名單硬資訊源做純 Python 機械抽取
# （發售 / 新品 / 併購 / 漲價 + summary 內現成的 SKU / 價格 / 發售日），
# 寫成手機友善的 reports/flash/<date>.md 並 commit。
#
# **全程零 LLM**（守 D5：不在 workflow 內呼叫 LLM API）——速報是機械抽取、不判讀，
# 所以不會退化成 D16 砍掉的「空殼 roundup」。趨勢判讀 + 挖 picks + For Me 仍是
# 對話 opus 深度版的活，不在這層做。
#
# 觸發方式：
#   - workflow_dispatch：唯一入口。擁有者手機 GitHub App 手動按 = 有人盯那一次，
#     不是無人值守排程 → 不違反 D16（砍的是 schedule，不是 dispatch）。
#   - 刻意「不」加 schedule：速報只在擁有者想看時手動拉，不每天自動 commit。
#
# 定位：直接產可讀速報，輸出落 reports/flash/（與深度版 reports/daily/ 分開，不踩 D16）。
# （原與 daily-brief workflow 分工——那支收訊號 + 產空骨架——但 daily-brief 已於 D30 退役刪檔，
#   深度 daily 全對話觸發；本速報層是僅存的手機 dispatch 產出路徑。）

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  flash:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Compute brief date (Asia/Taipei)
        id: d
        run: |
          d="$(TZ=Asia/Taipei date +%F)"
          echo "date=$d" >> "$GITHUB_OUTPUT"
          echo "Flash date (Taipei): $d / runner UTC: $(date -u +%FT%TZ)"

      - name: Generate flash (純機械抽取，零 LLM)
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python scripts/generate_flash.py \
            --date "${{ steps.d.outputs.date }}" \
            --out "reports/flash/${{ steps.d.outputs.date }}.md"

      - name: Commit flash if changed
        run: |
          git config user.name "style-superman-bot"
          git config user.email "actions@github.com"
          if [ -n "$(git status --porcelain reports/flash)" ]; then
            git add reports/flash
            git commit -m "flash: ${{ steps.d.outputs.date }}"
            # push race 防護：checkout→push 間隔內若 master 有他人 commit，原 push 會
            # non-fast-forward 失敗。先試 push，被拒就 rebase 到最新 master 再試，最多 3 次。
            n=0
            until git push; do
              n=$((n+1))
              if [ "$n" -ge 3 ]; then echo "push failed after ${n} attempts"; exit 1; fi
              echo "push rejected (concurrent update?); rebasing onto origin/master (attempt ${n})…"
              git pull --rebase origin master
            done
          else
            echo "No new flash to commit."
          fi
