name: Repo Health Patrol

# 週期巡檢 — Self-Evolution Loop 的「警告 → 有人理」斷鏈修復。
#
# 解決的問題（docs/lessons.md「每日系統的最大風險是根本沒在跑」）：
#   產線停擺時恰好沒人 push → CI 不跑 → repo_health 的新鮮度警告無人看見。
#   本 workflow 用 schedule 主動跑 --strict（WARN 也算失敗），有問題就：
#     1. run 變紅（GitHub 會通知 scheduled run 失敗）
#     2. 自動開 / 更新一個 `repo-health` issue——警告變成持久物件，不會衰退成噪音
#
# 巡檢盯的新鮮度＝月報缺檔 + 一致性 + 守衛 + 產出契約（週挑落後 D29 後只 INFO、不擋）。
# 註：daily 斷更看門狗已隨 D16 移除（daily 對話即焚、不入 reports/daily/、無檔可數），
#   daily-brief workflow 本身也已於 D30 退役刪檔；本巡檢不再是 daily 的看門狗。
#
# 觸發：每週一、四 UTC 01:00（台灣 09:00）+ 手動 dispatch。
#   頻率刻意不設每日：避免通知疲勞——警告的出口是 issue，不是洗版。

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * 1,4"

permissions:
  contents: read
  issues: write

jobs:
  patrol:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run repo health (strict)
        id: health
        env:
          PYTHONIOENCODING: utf-8
        # ⚠ 未顯式 shell: bash 時 Actions 用 `bash -e {0}`（無 pipefail）：
        #   repo_health 失敗會被 tee 的 exit 0 吃掉 → 巡檢永遠綠 = 看門狗假成功。
        run: |
          set -o pipefail
          python scripts/repo_health.py --strict | tee health-report.txt

      # 死源看門狗（2026-06-16）：--liveness 連網打每個 RSS、揪「設定在卻每次 403/0 則」的死源。
      # 它原本 opt-in、永不排程 → 違反反熵 D7（靠人類記得手動跑）。塞進這支週期巡檢補上。
      # 不弄 flaky 的關鍵：① continue-on-error，外站抖動絕不讓巡檢變紅；② 死源是 warn、
      # --liveness 不帶 --strict 故 exit 0，所以下面靠 grep「死源：」判斷而非 exit code；
      # ③ 限速(429)被 check_source_liveness 標為「非死源」，抖動造成的暫時 429 不會誤報。
      - name: Probe source liveness (death-of-source watchdog)
        if: always()
        continue-on-error: true
        env:
          PYTHONIOENCODING: utf-8
        run: |
          set -o pipefail
          python scripts/repo_health.py --liveness | tee health-liveness.txt || true

      - name: File or update health issue
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          # 開 issue 條件：strict 巡檢失敗，或 liveness 偵測到死源（限速不算）。兩者皆無就不開。
          need=0
          [ "${{ steps.health.outcome }}" = "failure" ] && need=1
          grep -q "死源：" health-liveness.txt 2>/dev/null && need=1
          if [ "$need" = "0" ]; then echo "巡檢全綠、無死源，不開 issue。"; exit 0; fi
          gh label create repo-health --description "repo_health.py 巡檢警告" --color D93F0B 2>/dev/null || true
          {
            echo "repo_health 巡檢於 $(date -u +%Y-%m-%dT%H:%MZ)："
            echo
            if [ "${{ steps.health.outcome }}" = "failure" ]; then
              echo '### ❌ --strict 未通過'
              echo '```'; cat health-report.txt; echo '```'; echo
            fi
            if grep -q "死源：" health-liveness.txt 2>/dev/null; then
              echo '### 🌐 RSS 死源（--liveness）'
              echo '```'; cat health-liveness.txt; echo '```'; echo
            fi
            echo "處理方式見 CLAUDE.md 的 Self-Evolution Loop；修好後關閉本 issue。"
            echo "死源處理：確認可否換域名/端點修復，真的無解就比照 D17 撤源（改 sources.yml + 記 decisions）；撤不撤是內容判斷、留擁有者拍板。"
            echo "若同類警告反覆出現且兩週無人處理，依 docs/lessons.md：要嘛修產線，要嘛調整節奏宣告，不要讓警告衰退成噪音。"
          } > issue-body.md
          # `// empty`：無開啟 issue 時 .[0].number 為 null，沒有 fallback 會印出字面 "null"
          # → 走進 comment 分支對 issue "null" 留言而失敗，新 issue 永遠開不出來。
          existing=$(gh issue list --label repo-health --state open --json number --jq '.[0].number // empty' || echo "")
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body-file issue-body.md
          else
            gh issue create --title "🩺 Repo health 巡檢未通過" --label repo-health --body-file issue-body.md
          fi
