# brands.yml
# 追蹤中的男裝 / 潮流品牌。系統會優先標記與這些品牌相關的訊號。
# 欄位：
#   id        代號
#   name      品牌名
#   region    主要發源地
#   segment   luxury / high-street / streetwear / workwear / techwear / heritage / sport / contemporary
#             （contemporary = 日系素材主義 / 上品：重布料·版型·完成度，不靠 logo/hype）
#   tier      1=重點追蹤  2=常態  3=雷達
#   watch     目前特別關注的點
#   notes     備註
#   taste     （選填）擁有者個人品味標記。anchor = Pei 喜歡的品味錨點/同溫品牌。
#             供「我喜歡的品牌」可靠查詢 + daily brief 🎯 For Me 優先比對，不靠 grep 散文。

brands:
  # ---------- 日本 ----------
  - id: visvim
    name: visvim
    region: jp
    segment: workwear
    tier: 1
    watch: ["民族工藝細節", "高單價二手保值"]
    notes: 日系 americana / craft 標竿

  - id: kapital
    name: KAPITAL
    region: jp
    segment: workwear
    tier: 1
    watch: ["boro 拼布", "怪趣味設計病毒傳播"]
    notes: 社群上極易爆紅的話題品牌

  - id: sacai
    name: sacai
    region: jp
    segment: luxury
    tier: 1
    watch: ["混搭剪裁", "聯名（Nike 等）"]
    notes: hybrid 剪裁影響整個產業

  - id: wtaps
    name: WTAPS
    region: jp
    segment: streetwear
    tier: 2
    watch: ["軍裝 workwear", "發售熱度"]
    notes: 日系街頭硬核代表

  - id: comme-des-garcons
    name: COMME des GARÇONS
    region: jp
    segment: luxury
    tier: 2
    watch: ["PLAY 大眾線", "聯名"]
    notes: 影響力跨越世代

  # ---------- 日本：素材主義 / contemporary（Pei 重點追蹤的日潮 lane）----------
  # 共同密碼：素材 → 版型 → 完成度做到極致，其餘留白。不靠 logo / 不追 hype。
  - id: auralee
    name: AURALEE
    region: jp
    segment: contemporary
    tier: 1
    watch: ["自家開發布料", "巴黎發表 / 國際擴張", "buyer 點名 tailored jacket"]
    notes: 此 lane 最 refined、最接近國際舞台；Pei 品味錨點
    taste: anchor

  - id: ciota
    name: CIOTA
    region: jp
    segment: contemporary
    tier: 1
    watch: ["軍裝 / 丹寧老工法重做", "indigo 染", "供給稀缺度"]
    notes: 最有 craft / 根源敘事的一家；Pei 品味錨點
    taste: anchor

  - id: neat
    name: NEAT
    region: jp
    segment: contemporary
    tier: 1
    watch: ["義 / 英高級毛料長褲", "tapered 乾淨版型", "型號擴充 / 別注"]
    notes: 一條好褲子主義的 specialist；Pei 品味錨點
    taste: anchor

  - id: comoli
    name: COMOLI
    region: jp
    segment: contemporary
    tier: 1
    watch: ["垂墜 refined basics", "每季定番演化", "二手保值"]
    notes: 此 lane 的定義者，幾乎是 AURALEE 的兄弟座標
    taste: anchor

  - id: a-presse
    name: A.PRESSE
    region: jp
    segment: contemporary
    tier: 1
    watch: ["vintage-rooted 熱度", "發售即售罄", "別注 / 聯名"]
    notes: 近年最熱的 vintage-rooted refined，熱度正高

  - id: kijima-takayuki
    name: KIJIMA TAKAYUKI
    region: jp
    segment: contemporary
    tier: 1
    watch: ["手工帽飾（草帽 / 貝雷 / cap）", "別注 / 聯名（Sunspel・FEIT 等）", "select shop 入荷"]
    notes: 日本帽飾作家（1996 獨立、大官山 atelier 全手工）；此 lane 的帽子 / 配件錨點；Pei 品味錨點（喜歡）
    taste: anchor

  # 帽飾同溫層（Kijima 深掘 radar 2026-06-20 領跑，見 reports/analysis 若封存）
  - id: hw-dog-co
    name: THE H.W. DOG & CO.
    region: jp
    segment: contemporary
    tier: 2
    watch: ["木楦 + 老機台手工帽", "felt / Panama / cap / beret 全品類", "select shop 入荷 / 別注"]
    notes: 東京 2015 職人帽匠；「1930-40 製帽黃金年代」哲學、不向量產妥協；vintage workwear 底，Kijima 同溫最近一家
    taste: anchor

  - id: mature-ha
    name: mature ha.
    region: jp
    segment: contemporary
    tier: 2
    watch: ["招牌 Boxed Hat（可折收草帽）", "極簡 refined 帽型", "select shop 入荷"]
    notes: 神戶 2011 夫妻創立；招牌可壓收 Boxed Hat（82% 紙混紡、旅行帽）；極簡岔路、補衣櫥「能收進包的好帽」
    taste: anchor

  - id: markaware
    name: marka / MARKAWARE
    region: jp
    segment: contemporary
    tier: 2
    watch: ["永續素材主義 tailoring", "buyer 選品"]
    notes: 報告 SS26 buyer 選品點到；可持續取向

  - id: graphpaper
    name: Graphpaper
    region: jp
    segment: contemporary
    tier: 2
    watch: ["contemporary minimal", "select shop 自有企劃 / 別注"]
    notes: 版型更現代一點；店+品牌雙身份

  - id: stein
    name: stein
    region: jp
    segment: contemporary
    tier: 2
    watch: ["現代 oversize refined", "版型實驗"]
    notes: 同 lane 但廓形更前衛

