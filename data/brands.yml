# brands.yml
# 追蹤中的男裝 / 潮流品牌。系統會優先標記與這些品牌相關的訊號。
# 欄位：
#   id        代號
#   name      品牌名
#   region    主要發源地
#   segment   luxury / high-street / streetwear / workwear / techwear / heritage / sport
#   tier      1=重點追蹤  2=常態  3=雷達
#   watch     目前特別關注的點
#   notes     備註

brands:
