# people.yml
# 追蹤中的關鍵人物。帶動風向的人，是趨勢最早的訊號源之一。
# 2026-06-14 精簡（#4）：從 10 人縮到 3 個 lane 最相關的——大咖的大動作本來就會從 RSS 新聞源進來
# （例：A$AP Rocky 靠 Knicks 那條自然入榜），這份清單只當「被動參考 context」，不做每日主動人物掃描
# （那會花工又易飄八卦、離「歐美趨勢+值得買」主線）。需要再加人時點名補。
# 欄位：
#   id        代號
#   name      名字
#   role      designer / stylist / musician / athlete / actor / kol / editor
#   region    主要影響區
#   influence 1=現象級  2=高  3=利基
#   watch     關注什麼
#   notes     備註

people:
  - id: jonathan-anderson
    name: Jonathan Anderson
    role: designer
    region: us-eu
    influence: 1
    watch: ["品牌任職動向", "個人選品影響"]
    notes: 一舉一動牽動高端男裝；設計師端的早期方向訊號

  - id: asap-rocky
    name: A$AP Rocky
    role: musician
    region: us-eu
    influence: 1
    watch: ["紅毯與街拍", "帶火的單品"]
    notes: 帶貨能力現象級；街頭單品早期訊號

  - id: nba-tunnel
    name: NBA Tunnel Fits（群體）
    role: athlete
    region: us-eu
    influence: 1
    watch: ["球員入場穿搭", "造型師選擇"]
    notes: 男性運動 x 時尚最大流量入口之一
