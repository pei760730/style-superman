# google-trends.yml
# Google Trends 月度搜尋熱度快照——補 Lyst（季度）/ StockX（年度）之間的歐美量化空窗。
#
# 來源：https://trends.google.com/trends/ （免費、公開）
# 性質：搜尋興趣 = 需求的前置訊號；相對值（0–100）非絕對量，方法論固定才可跨月比對。
# 用途：月報的量化輸入之一；趨勢卡「生命週期判斷」的佐證（升溫中 or 退燒中）。
#
# ── 固定方法論（改了就不可跨月比對，變更需記 CHANGELOG）────────────────
#   region:    US（歐美趨勢以美國為代理；如需 UK 另開欄位，不混算）
#   timeframe: past 90 days（平滑單週雜訊，又比 12 個月靈敏）
#   類別:      購物 (Shopping)；搜尋類型: Web Search
#   正規化:    每批最多 4 個追蹤詞 + 固定錨點詞 "sneakers" 同批比較，
#              記「該詞 90 天均值 ÷ 錨點詞 90 天均值」(anchor_ratio，兩位小數)——
#              錨點固定，跨批、跨月才可比。
#   讀數規則:  只記 anchor_ratio 與方向（↑↓→，對上月）；不記 Google 原始 0–100
#              （原始值隨批次組合變動，無跨批意義）。
#   頻率:      每月 1 次（建議月初，與月報同節奏），人工拉取約 20 分鐘——
#              Google Trends 無公開 API，逐月手動是刻意選擇（不接非官方 API，輕依賴）。
#
# ── 追蹤關鍵字（主編維護；增刪記 CHANGELOG。出處 = repo 內哪個判斷需要它）──
# anchor: "sneakers"
# tracked:
#   - "washed jeans"        # 趨勢卡 washed-denim-2026（主打）
#   - "barrel jeans"        # 丹寧版型對照組（score_trends demo 既有追蹤）
#   - "boat shoes"          # 夏季莫卡辛輪廓（2026-06-11 頭條，候選趨勢卡）
#   - "loafers"             # 樂福鞋長線（與 boat shoes 對照）
#   - "Salomon"             # gorpcore 代理（2026-06-10 頭條 3）
#   - "Asics"               # Gel-1130 / OT 分社化觀察
#   - "New Balance"         # 高端線溫度計（JJJJound 1890 等）
#   - "Onitsuka Tiger"      # 分社化後高端化路線觀察
#   - "football jersey"     # blokecore 窗口（世界盃 6/11–7/19）
#   - "graphic tee"         # 文化含量重新定價（2026-06-11 頭條 4）
#   - "double knee pants"   # 到頂判斷的驗證（退燒 or 變基本款）
#   - "Stone Island"        # SI×NB 聯名 + premium sports 吃精品位置

source: google-trends
region: us-eu
cadence: monthly
free: true
url: https://trends.google.com/trends/

# 快照由上而下 = 新到舊（同 docs/rankings.md 排序細則）。
# 首期快照待第一次人工拉取（流程見 docs/rankings.md「Google Trends」節）；不預填、不虛構。
snapshots: []
