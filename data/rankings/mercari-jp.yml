# mercari-jp.yml
# Mercari（メルカリ）二手成交快照。日本最大二手平台，成交 = 需求訊號。
#
# 來源：https://about.mercari.com/press/  （官方 press / トレンド通信，免費）
# 性質：日本版 StockX，但更廣（非球鞋導向）、更貼近大眾日常消費。
# 用途：看「哪些品牌在日本最保值、最好流通」——比 EC 新品榜更反映真實需求黏性。

source: mercari-jp
region: jp
cadence: report          # 報告不定期；平台數據即時
free: true
url: https://about.mercari.com/press/

snapshots:
  - period: "2013→2022"
    published: "2023"
    report: "メルカリ 10 周年總結"
    notes: >
      品牌成交榜 #1 從 Chanel（2013）轉為 Uniqlo（2022）——「日常實用物品輕鬆轉售」
      的消費行為定著，從精品轉向實穿大眾品。

    brand_top:
      rank: 1
      name: Uniqlo
      note: "2022 最多成交品牌（2013 時為 Chanel）"

    # 跨世代最好賣 / 最保值的品牌
    cross_gen_brands: ["Nike", "GU", "Zara", "The North Face"]

    # 平台品類結構變化
    category_shift:
      - "女裝佔比 37%(2014) → 18%(2023)"
      - "娛樂・嗜好 11% → 28%（推し活帶動）"

    menswear_read:
      - "二手 #1 Chanel→Uniqlo：日本男裝需求黏性在『實穿耐用』而非 logo 炫耀"
      - "Nike / GU / Zara / TNF 跨世代保值 → 安全押注、好流通"
      - "新品熱度看 zozotown.yml；需求黏性 / 保值看這裡，兩者互補"
