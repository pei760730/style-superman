# 來源：https://www.musinsa.com/ranking/archive （官方月간 랭킹，免費）
# 性質：平台「銷售榜」——每日晨更，僅以會員直接購買 + 點擊計算，광고 미반영（不含廣告權重）。
#       提供性別/品類 TOP30。最貼「韓國男性實際在買什麼」。
# 限制：平台內部榜，只反映 MUSINSA 站內庫存與用戶，有平台商業偏差；尖端設計師潮流仍要看媒體。
#       逐位榜頁為 JS 動態。2026-06-20（D23）：Firecrawl keyless 結構化抽取實測攻破（30 項，grounded）→
#       需要時由 AI 對話端 Firecrawl 抓當期榜、確認口徑後寫 dated 快照進此檔（不進腳本，見 docs/rankings.md）。

