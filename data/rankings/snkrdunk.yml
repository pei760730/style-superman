# snkrdunk.yml
# SNKRDUNK（スニーカーダンク／スニダン）球鞋轉售成交快照。日本最大鑑定付球鞋轉售平台（日版 StockX）。
#
# 來源：https://snkrdunk.com/products?type=hottest （hottest 即時人氣榜，免費瀏覽）
# 性質：鑑定付二級市場成交/人氣 = 日本真實轉售需求，偏球鞋/聯名/限量。比 ZOZO（撤）更專、更貼街頭。
#       補上日本量化板的空白（2026-06-14 因 ZOZO/Mercari 全擋而撤的板，D24 用 SNKRDUNK 重建）。
# 限制：平台內部人氣/成交，反映日本 sneakerhead 消費，非全時尚市場；尖端日潮（visvim/Kapital/設計師成衣）
#       仍要看媒體街拍。hottest 榜為 JS 動態渲染，WebFetch 抓不到。
#       2026-06-21（D24）：Firecrawl keyless 結構化抽取實測攻破 hottest 榜（10 項，grounded、跨 StockX/KREAM 互證）→
#       需要時由 AI 對話端 Firecrawl 抓當期榜、確認口徑後寫 dated 快照進此檔（不進腳本，見 docs/rankings.md）。

source: snkrdunk
region: jp
cadence: monthly         # 站上 hottest 即時；本檔按需記 dated 快照
free: true
url: https://snkrdunk.com/products?type=hottest

