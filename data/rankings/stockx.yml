# stockx.yml
# StockX 轉售/熱銷快照。每份報告新增一筆，最新放最上面。
#
# 來源：https://stockx.com/about/  （Big Facts / Current Culture Index，免費）
# 性質：轉售實數，偏球鞋/街頭 → 男裝代表性最強；涵蓋不到精品成衣。
# 注意：StockX 報告混用「全站最暢銷」與「各品牌年度最佳新款」兩種口徑，
#       這裡如實分欄記錄，不硬湊成單一 1–10 排名。

source: stockx
cadence: annual+midyear
free: true
url: https://stockx.com/about/

snapshots:
  - period: "2025-annual"
    published: "2026-01"
    report: 'Big Facts: Current Culture Index 2026（第 7 屆年度報告，2026-01-12 發佈）'
    notes: >
      2025 全年「定版」數字。下一筆 2025-ytd（Big Facts: 2025 Trends，2025-11-12 發佈）
      是同年度的 11 月先行盤點，故部分數字不同（如 Mizuno 先行 +148% → 定版 +124%）；
      兩版口徑不同，依鐵則分開記錄。新聞稿僅有品牌層級資料，
      單品名（如 2025 最暢銷球鞋型號定版）待查（需讀完整報告圖檔）。
    best_seller_sneaker:
      brand: 待查
      item: 待查
      note: 新聞稿未列單品；2025 最暢銷球鞋品牌前五（連續第 3 年）：Nike / Jordan / adidas / New Balance / ASICS
    apparel_top:
      brand: Fear of God
      item: 待查
      note: '連續第 4 年 apparel 類 #1'
    fastest_growing_brands:
    - brand: Mizuno
      change: +124%
      note: 球鞋成長最快；MXR / Wave Prophecy Moc lifestyle 化
    - brand: Maison Mihara Yasuhiro
      change: +91%
      note: 球鞋
    - brand: Saucony
      change: +59%
      note: 球鞋
    - brand: Salomon
      change: +58%
      note: 球鞋
    - brand: Uniqlo
      change: +667%
      note: 服飾
    - brand: SKIMS
      change: +196%
      note: 服飾
    - brand: adidas
      change: +49%
      note: 服飾
    - brand: Sprayground
      change: +287%
      note: 配件
    - brand: Syna World
      change: +251%
      note: 配件
    price_signals:
    - Nike 球鞋均價 YoY +5%、Jordan +6% — 軟了一段時間後的回暖跡象
    predictions_2026:
    - FIFA 世界盃年：足球影響加速（復古釘鞋 lifestyle 化、俱樂部 x 街頭品牌聯名）
    - Bad Bunny：Super Bowl 中場 + 首雙 adidas 全原創簽名鞋
    - 米蘭冬奧：運動 x 時尚交叉
    - Pokémon 30 週年帶動交易卡持續成長
    menswear_focus:
    - Top5 球鞋品牌連 3 年不變（Nike/Jordan/adidas/NB/ASICS），但價格訊號顯示 Nike/Jordan 觸底回暖（解讀）
    - 跑鞋復興第二波：Mizuno +124% 接棒 ASICS/Brooks，Saucony/Salomon 續漲 — gorpcore/運動越界仍在半山腰（解讀）
    - Uniqlo 服飾轉售 +667%：實穿大眾品在二級市場起飛，與 Mercari『Chanel→Uniqlo』結構互相印證（解讀）
    - 2026 世足年：復古足球釘鞋 lifestyle 化值得提前盯（adidas 受益面最大）（解讀）
  - period: "2025-ytd"
    published: "2025-11"     # 2025-11-12 發佈，年度先行盤點（年初至發佈時點）
    report: "Big Facts: 2025 Trends（11 月先行版；全年定版見上一筆 CCI 2026）"

    # 全站最暢銷（明確口徑）
    best_seller_sneaker:
      brand: ASICS
      item: "Gel-1130 (Black/Pure Silver)"
      note: "2025 全站最暢銷球鞋；ASICS YoY +45%"

    apparel_top:
      brand: "Fear of God Essentials"
      item: "Arch Logo Hoodie (Jet Black)"
      note: "服飾類銷售第一"

    accessory_top:
      brand: Nike
      item: "Pro Therma-Fit Hyperwarm Hood"
      note: "配件類第一"

    all_time_best_seller:
      brand: Nike
      item: "Dunk Low Retro White Black (Panda)"
      note: "平台史上最暢銷球鞋"

    # 各品牌「年度最佳新款」（品牌口徑，非全站排名）
    notable_new_models:
      - { brand: Nike,           item: "Ja 3",              note: "Nike #1 新款" }
      - { brand: Nike,           item: "A'ja Wilson A'One", note: "Nike #2 新款" }
      - { brand: Nike,           item: "Total 90 III",      note: "Nike #3 新款" }
      - { brand: Nike,           item: "Kobe 6 Protro",     note: "#1 實戰籃球鞋；YoY +100%" }
      - { brand: New Balance,    item: "204L",              note: "NB #1 新款" }
      - { brand: adidas,         item: "Samba Jane",        note: "adidas #1 新款" }
      - { brand: adidas,         item: "Bad Bunny Ballerina", note: "adidas #3 新款" }
      - { brand: Converse,       item: "Shai 001",          note: "Converse #1 新款" }
      - { brand: Onitsuka Tiger, item: "TGRS",              note: "品牌最佳新款" }

    # 成長最快品牌（YoY）
    fastest_growing_brands:
      - { brand: Brooks,  change: "+1508%" }
      - { brand: Mizuno,  change: "+148%" }
      - { brand: ASICS,   change: "+45% YoY" }
      - { brand: Saucony, change: "+38%" }

    # 男裝/潮流解讀（手動標）
    menswear_focus:
      - "跑鞋復興：ASICS / Brooks / Mizuno / Saucony 全面起飛 — gorpcore 與運動越界延續"
      - "Salomon、ASICS 在年中報告即為成長最快 — 對應 SS2026『運動 x 時尚』"
      - "Fear of God Essentials Hoodie 仍是街頭服飾銷售王 — elevated basics 長青"
