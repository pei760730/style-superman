# sources.yml
# 情報來源清單。系統每日從這些來源收集潮流訊號。
# 欄位說明：
#   id        唯一代號（小寫 kebab）
#   name      顯示名稱
#   region    jp / kr / us-eu / global
#   type      media / brand / community / social / retailer
#   tier      1=核心必看  2=常態追蹤  3=輔助/驗證
#   url       主站
#   rss       RSS（若有，未來自動抓取用；無則留 null）
#   body_fetchable  false=WebFetch 讀不到內文（網站封鎖 crawler 或付費牆，如 GQ gq.com）。
#                   2026-06-20（D22）起：標 false 的 roundup **先改用 Firecrawl keyless scrape 挖 picks**（試用勝出落地，
#                   實測 GQ/wwd-japan 皆 200、結構化抽取乾淨）；Firecrawl 也挖不到才直接不列。省略/true=WebFetch 可讀。
#   notes     用途備註
#
# 🚪 新增來源前的門檻（擁有者 2026-06-14 拍板，D18）——兩關都過才加，寧缺勿濫：
#   ① 持續產出：要「會一直出新內容」——查近 30 天更新頻率（至少每週數篇）。
#      只在大事件才更新、或已半停更的不收（會變死權重：cf. Mercari 年報轉趨勢詞已撤、
#      google-trends 手動月拉 D7 砍）。
#   ② 夠權威：有編輯判斷 / 一手資訊 / 行業地位，不是聚合農場或 SEO 內容站。
#   （新增來源是內容判斷、需擁有者拍板；tier 不批量改＝D4。加之前先 WebFetch 實測可讀，
#    讀不到就標 body_fetchable: false。）

