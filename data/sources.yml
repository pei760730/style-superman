      偏球鞋/街頭，男裝代表性最強，但涵蓋不到精品成衣。
      快照見 data/rankings/stockx.yml

  # 註：Google Trends 月度快照已於 2026-06-11 移除（D7 第一性原理瘦身）——
  # 每月 20 分鐘人類手動拉取、建立後一期都沒拉過，違反「不依賴人類定期手動勞動」原則。
  # 方法論存於 git 歷史，若未來有自動化途徑可復活。

  # 日本：沒有單一威望榜，靠二手成交需求 + 穿搭社群
