# sources.yml
# 情報來源清單。系統每日從這些來源收集潮流訊號。
# 欄位說明：
#   id        唯一代號（小寫 kebab）
#   name      顯示名稱
#   region    jp / kr / us-eu / global
#   type      media / brand / community / social / retailer
#   tier      1=核心必看  2=常態追蹤  3=輔助/驗證
#   url       主站
#   rss       RSS（若有，未來自動抓取用；無則留 null）
#   notes     用途備註

sources:
  # ---------- 全球潮流媒體 ----------
  - id: hypebeast
    name: Hypebeast
    region: global
    type: media
    tier: 1
    url: https://hypebeast.com/
    rss: https://hypebeast.com/feed
    notes: 街頭 / 聯名 / 球鞋的全球風向標

  - id: highsnobiety
    name: Highsnobiety
    region: global
    type: media
    tier: 1
    url: https://www.highsnobiety.com/
    rss: https://www.highsnobiety.com/feed/
    notes: 高端街頭 + 文化視角，選題深度佳

  - id: gq-style
    name: GQ Style
    region: us-eu
    type: media
    tier: 2
    url: https://www.gq.com/style
    rss: https://www.gq.com/feed/rss   # 全站 feed（含非 style 內容，篩選交 article_to_insight）；2026-06-10 實測可解析
    notes: 主流男裝、紅毯與名人穿搭

  - id: esquire-style
    name: Esquire Style
    region: us-eu
    type: media
    tier: 3
    url: https://www.esquire.com/style/
    rss: https://www.esquire.com/rss/all.xml   # 全站 feed（含非 style 內容）；2026-06-10 實測可解析
    notes: 經典男裝、tailoring 角度

  # ---------- 日潮 ----------
  - id: hypebeast-jp
    name: Hypebeast JP
    region: jp
    type: media
    tier: 1
    url: https://hypebeast.com/jp
    rss: https://hypebeast.com/jp/feed   # 2026-06-10 實測可解析
    notes: 日本在地聯名與發售情報

  - id: fashionsnap
    name: Fashionsnap
    region: jp
    type: media
    tier: 1
    url: https://www.fashionsnap.com/
    rss: https://www.fashionsnap.com/rss.xml
    notes: 日本時尚產業最完整的新聞源

  - id: wwd-japan
    name: WWD Japan
    region: jp
    type: media
    tier: 2
    url: https://www.wwdjapan.com/
    rss: https://www.wwdjapan.com/feed   # 2026-06-10 實測可解析
    notes: 產業 / 品牌營運 / 秀場

  - id: mens-nonno
    name: MEN'S NON-NO
    region: jp
    type: media
    tier: 1
    url: https://www.mensnonno.jp/
    rss: https://www.mensnonno.jp/feed/   # 2026-06-10 實測可解析
    notes: 街頭 / 當代 / 高端男裝穿搭，日本男裝雜誌指標

  - id: popeye-mag
    name: POPEYE / BRUTUS
    region: jp
    type: media
    tier: 2
    url: https://popeyemagazine.jp/
    rss: https://popeyemagazine.jp/feed/   # 2026-06-10 實測可解析
    notes: city boy 美學源頭，文化視角的男性風格

  - id: houyhnhnm
    name: Houyhnhnm（フウィナム）
    region: jp
    type: media
    tier: 2
    url: https://www.houyhnhnm.jp/
    rss: https://www.houyhnhnm.jp/feed/   # 2026-06-10 實測可解析
    notes: 日系街頭 / 設計師 / 文化媒體，抓尖端日潮

  # ---------- 韓潮 ----------
  - id: hypebeast-kr
    name: Hypebeast KR
    region: kr
    type: media
    tier: 1
    url: https://hypebeast.kr/
    rss: https://hypebeast.kr/feed   # 2026-06-10 實測可解析
    notes: 韓國街頭 / 聯名 / 發售情報，作為 KR 高訊號密度專業媒體

  - id: musinsa
    name: MUSINSA
    region: kr
    type: retailer
    tier: 1
    url: https://www.musinsa.com/
    rss: null
    notes: 韓國代表性時尚平台，可觀察男裝品牌、發售與平台編輯推品；商業偏差需標註

  - id: musinsa-newsroom
    name: MUSINSA Newsroom
    region: kr
    type: media
    tier: 2
    url: https://about.musinsa.com/newsroom
    rss: null
    notes: MUSINSA 集團動態與平台品牌新聞；可證明官方 / 平台事件，不單獨證明熱賣

  - id: eyesmag
    name: EYESMAG
    region: kr
    type: media
    tier: 2
    url: https://www.eyesmag.com/
    rss: null
    notes: 韓國 fashion / lifestyle / street culture 媒體，適合抓韓系街頭、聯名與設計師動向

  - id: dazed-korea
    name: Dazed Korea
    region: kr
    type: media
    tier: 2
    url: https://dazedkorea.com/
    rss: https://dazedkorea.com/feed   # 2026-06-10 實測可解析；偏 editorial / K-pop，credibility 篩選交 insight 層
    notes: 韓國時尚 editorial 與 K-pop 造型訊號；偏編輯 / 名人曝光，需與其他來源交叉驗證

  - id: w-korea
    name: W Korea
    region: kr
    type: media
    tier: 2
    url: https://www.wkorea.com/
    rss: https://www.wkorea.com/feed/   # 2026-06-10 實測可解析
    notes: 高端時尚、名人造型與 K-pop editorial；可補品牌露出與造型脈絡

  - id: vogue-korea
    name: Vogue Korea
    region: kr
    type: media
    tier: 2
    url: https://www.vogue.co.kr/
    rss: null
    notes: 精品與 K-pop 造型曝光；作為韓潮名人穿搭與高端品牌外溢的確認訊號

  - id: wwd-korea
    name: WWD Korea
    region: kr
    type: media
    tier: 2
    url: https://www.wwdkorea.com/
    rss: https://www.wwdkorea.com/rss/allArticle.xml   # 2026-06-10 實測可解析
    notes: 韓國時尚產業、設計師與品牌商業動態；偏脈絡與事件確認

  - id: cm29
    name: 29CM
    region: kr
    type: retailer
    tier: 2
    url: https://29cm.co.kr/
    rss: null
    notes: 韓國 curated fashion / lifestyle 平台；可觀察韓系設計師與零售端策展，但不得單獨寫成銷售硬數據

  - id: kream
    name: KREAM
    region: kr
    type: retailer
    tier: 2
    url: https://kream.co.kr/
    rss: null
    notes: 韓國 resale / drops 平台，可觀察球鞋、街頭與發售需求；需標明平台與轉售口徑限制

  # ---------- 社群（人工監看，未來接 API） ----------
  - id: ig-menswear
    name: Instagram — Menswear hashtags
    region: global
    type: social
    tier: 1
    url: https://www.instagram.com/explore/tags/menswear/
    rss: null
    notes: 監看 #menswear #ootdmen #techwear 等標籤的熱度變化

  - id: tiktok-mensfashion
    name: TikTok — Men's Fashion
    region: global
    type: social
    tier: 1
    url: https://www.tiktok.com/tag/mensfashion
    rss: null
    notes: 短影音趨勢源頭，輪廓 / 配色 / 單品爆紅的第一現場

  - id: reddit-malefashion
    name: Reddit r/malefashionadvice
    region: us-eu
    type: community
    tier: 2
    url: https://www.reddit.com/r/malefashionadvice/
    rss: https://www.reddit.com/r/malefashionadvice/.rss
    notes: 歐美素人討論，驗證趨勢是否真的落地

  - id: reddit-techwear
    name: Reddit r/techwearclothing
    region: global
    type: community
    tier: 3
    url: https://www.reddit.com/r/techwearclothing/
    rss: https://www.reddit.com/r/techwearclothing/.rss
    notes: >
      機能風垂直社群。品質警訊（2026-06-10）：盜播 spam 灌版（8 則中 5 則），
      collect 層已對 community 來源加標題層 spam 過濾；若髒訊號持續穿透，下一步降級或移除。

  # ---------- 零售 / 發售追蹤 ----------
  - id: ssense
    name: SSENSE
    region: global
    type: retailer
    tier: 2
    url: https://www.ssense.com/en-us/men
    rss: null
    notes: 看哪些設計師單品被推、被折扣，反映庫存與需求

  - id: end-clothing
    name: END. Clothing
    region: us-eu
    type: retailer
    tier: 3
    url: https://www.endclothing.com/
    rss: null
    notes: 發售與 raffle 熱度

  # ---------- 排行 / 數據源 (rankings) ----------
  # 定期發布、可量化的「最紅品牌 / 熱銷單品」排行。
  # 結構化快照存在 data/rankings/，用 scripts/track_rankings.py 比對演化。
  - id: lyst-index
    name: Lyst Index
    region: global          # 偏 us-eu + 精品；全性別（女裝權重高）
    type: ranking
    tier: 1
    url: https://www.lyst.com/data/the-lyst-index/
    rss: null
    cadence: quarterly      # 季度發布；底層數據為月對月 (MoM)
    notes: >
      免費權威榜：最紅品牌 Top 20 + 最熱單品 Top 10。
      2026 Q1 起 methodology 改為 desire/demand/discovery 三維。
      偏精品/全性別 → 男裝需自行過濾。快照見 data/rankings/lyst-index.yml

  - id: stockx
    name: StockX (Big Facts / Current Culture Index)
    region: global          # 美國主導；偏男性街頭
    type: ranking
    tier: 1
    url: https://stockx.com/about/
    rss: null
    cadence: annual+midyear # 年度 + 年中報告；平台數據即時
    notes: >
      免費轉售/熱銷實數：最暢銷球鞋、服飾、配件、成長最快品牌。
      偏球鞋/街頭，男裝代表性最強，但涵蓋不到精品成衣。
      快照見 data/rankings/stockx.yml

  # 日本：沒有單一威望榜，靠二手成交需求 + 穿搭社群
  # 註：ZOZOTOWN 男裝銷售榜已評估後移除——zozo.jp 由 Akamai 防護，對非瀏覽器
  #     請求回 403、頁面 JS 動態渲染，無真實 headless 瀏覽器無法準確抓取逐位名次，
  #     超出本 repo 該背的重量。寧缺勿濫（不準確就不留）。詳見 CHANGELOG / docs/rankings.md。
  - id: wear-zozo
    name: WEAR by ZOZO
    region: jp
    type: ranking
    tier: 2
    url: https://wear.jp/men-ranking/
    rss: null
    cadence: realtime
    notes: >
      穿搭社群男裝時榜（wear.jp 可存取，非 Akamai 擋）。給的是「熱門穿搭貼文」，
      非單品銷售榜，且品牌/單品需逐篇再抓 → metric 與 EC 榜不同。目前僅列為來源，未建 rankings 快照。

  - id: mercari-jp
    name: Mercari（メルカリ）
    region: jp
    type: ranking
    tier: 2
    url: https://about.mercari.com/press/
    rss: null
    cadence: report         # 報告不定期；平台數據即時
    notes: >
      日本最大二手平台，成交=需求訊號。品牌榜 10 年來 #1 從 Chanel→Uniqlo。
      日本版的 StockX，但更廣、非球鞋導向。快照見 data/rankings/mercari-jp.yml
